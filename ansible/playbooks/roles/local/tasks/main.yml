- name: Set var project dir
  set_fact:
    main_dir: "{{ lookup('ansible.builtin.env', 'HOME') }}/lab.nextcloud"

- name: Report var
  debug:
    msg: "Home Directory: {{ main_dir }}"

- name: Create venv
  pip:
    name:
      - pyyaml
      - python-dotenv
    virtualenv: "{{ main_dir }}/env"

- name: Run pre-deployment.py
  command: "{{ main_dir }}/env/bin/python pre-application.py"
  args:
    chdir: "{{ main_dir }}"
  register: script_output

- name: Check vpn
  shell: ip a | grep '{{ vpn_name }}'
  register: vpn_status
  failed_when: false

- name: Set vpn status
  set_fact:
    vpn_connected: "{{ vpn_status.stdout != '' }}"

- name: Report vpn status
  ansible.builtin.debug:
    msg: "VPN Connected: {{ vpn_connected }}"

- name: Connect vpn if not alive
  command: wg-quick up {{ vpn_name }}
  when: not vpn_connected

- name: Create ssh
  community.crypto.openssh_keypair:
    path: "{{ ssh_path }}"
    type: rsa
    size: 4096
    state: present
    force: no
